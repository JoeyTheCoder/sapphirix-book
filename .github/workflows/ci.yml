name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create frontend build env
        env:
          FRONTEND_ENV: ${{ secrets.FRONTEND_ENV }}
        run: |
          if [ -z "$FRONTEND_ENV" ]; then
            echo "Missing GitHub Actions secret: FRONTEND_ENV"
            exit 1
          fi

          printf '%s\n' "$FRONTEND_ENV" > .env

      - name: Build workspace
        run: pnpm build

      - name: Run smoke tests
        run: pnpm test:smoke