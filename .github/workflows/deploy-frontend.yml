name: Deploy Production

on:
  workflow_dispatch:
  push:
    branches:
      - master

env:
  DEPLOY_ROOT: /var/www/fadeflow
  FRONTEND_DEPLOY_PATH: /var/www/fadeflow/frontend/current
  BACKEND_DEPLOY_PATH: /var/www/fadeflow/app/current
  BACKEND_SERVICE_NAME: fadeflow-backend

jobs:
  deploy-production:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create frontend build env
        env:
          FRONTEND_ENV: ${{ secrets.FRONTEND_ENV }}
        run: |
          if [ -z "$FRONTEND_ENV" ]; then
            echo "Missing GitHub Actions secret: FRONTEND_ENV"
            exit 1
          fi

          printf '%s\n' "$FRONTEND_ENV" > .env

      - name: Build frontend
        run: pnpm --filter frontend build

      - name: Build backend
        run: pnpm --filter backend build

      - name: Prepare backend deployment bundle
        run: |
          rm -rf .deploy
          mkdir -p .deploy/app/current/apps/backend
          cp package.json .deploy/app/current/package.json
          cp pnpm-lock.yaml .deploy/app/current/pnpm-lock.yaml
          cp pnpm-workspace.yaml .deploy/app/current/pnpm-workspace.yaml
          cp apps/backend/package.json .deploy/app/current/apps/backend/package.json
          cp -R apps/backend/dist .deploy/app/current/apps/backend/dist
          cp -R apps/backend/drizzle .deploy/app/current/apps/backend/drizzle

      - name: Prepare SSH key
        env:
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${{ secrets.VPS_SSH_PORT || 22 }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure remote directories exist
        run: |
          ssh -p "${{ secrets.VPS_SSH_PORT || 22 }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "mkdir -p '${{ env.FRONTEND_DEPLOY_PATH }}' '${{ env.BACKEND_DEPLOY_PATH }}'"

      - name: Upload frontend build
        run: |
          rsync -az --delete -e "ssh -p ${{ secrets.VPS_SSH_PORT || 22 }}" \
            apps/frontend/dist/frontend/browser/ \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ env.FRONTEND_DEPLOY_PATH }}/"

      - name: Upload backend build bundle
        run: |
          rsync -az --delete \
            --exclude '.env' \
            --exclude '.env.*' \
            --exclude 'node_modules' \
            -e "ssh -p ${{ secrets.VPS_SSH_PORT || 22 }}" \
            .deploy/app/current/ \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ env.BACKEND_DEPLOY_PATH }}/"

      - name: Install prod deps, migrate, and restart backend
        run: |
          ssh -p "${{ secrets.VPS_SSH_PORT || 22 }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
            set -euo pipefail
            cd '${{ env.BACKEND_DEPLOY_PATH }}'
            corepack enable
            corepack prepare pnpm@10.33.0 --activate
            pnpm install --filter backend --prod --frozen-lockfile
            if [ ! -f '${{ env.DEPLOY_ROOT }}/shared/.env' ]; then
              echo 'Missing shared env file: ${{ env.DEPLOY_ROOT }}/shared/.env'
              exit 1
            fi
            ln -sfn '${{ env.DEPLOY_ROOT }}/shared/.env' '${{ env.BACKEND_DEPLOY_PATH }}/.env'
            pnpm --filter backend run db:migrate:prod
            sudo systemctl restart '${{ env.BACKEND_SERVICE_NAME }}'
            sudo systemctl status '${{ env.BACKEND_SERVICE_NAME }}' --no-pager
            if sudo systemctl is-active --quiet nginx; then
              sudo systemctl reload nginx
            fi
          "